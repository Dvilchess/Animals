name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt

      - name: Verificar que la API importa correctamente
        run: |
          python -c "from src.api import app; print('✅ API OK')"

      - name: Verificar que el modelo importa correctamente
        run: |
          python -c "from src.model import construir_modelo; print('✅ Modelo OK')"